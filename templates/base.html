<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family={{ theme.font_heading }}:wght@400;600;700&family={{ theme.font_body }}:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: {{ theme.primary_color }};
      --secondary: {{ theme.secondary_color }};
      --accent: {{ theme.accent_color }};
      --text: {{ theme.text_color }};
      --bg: {{ theme.background_color }};
      --font-heading: '{{ theme.font_heading }}', sans-serif;
      --font-body: '{{ theme.font_body }}', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: {{ width }}px;
      height: {{ height }}px;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
