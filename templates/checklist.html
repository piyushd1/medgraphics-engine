{% extends "base.html" %}

{% block extra_styles %}
<style>
    .container {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 80px 60px;
    }

    header {
        margin-bottom: 60px;
        border-bottom: 4px solid var(--secondary);
        padding-bottom: 30px;
    }

    h1 {
        font-family: var(--font-heading);
        font-size: 3.5rem;
        color: var(--primary);
    }

    .content-area {
        display: flex;
        flex-grow: 1;
        gap: 50px;
        align-items: center;
    }

    .illustration {
        flex: 0.8;
        background-color: var(--secondary);
        border-radius: 30px;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 8rem;
        color: var(--primary);
    }

    .checklist {
        flex: 1.2;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .check-item {
        background: white;
        border-radius: 16px;
        padding: 30px;
        display: flex;
        align-items: flex-start;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        transition: transform 0.2s;
    }

    .check-icon {
        font-size: 2.5rem;
        margin-right: 20px;
        background: var(--secondary);
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .check-content {
        flex-grow: 1;
    }

    .check-heading {
        font-family: var(--font-heading);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 8px;
    }

    .check-desc {
        font-size: 1.2rem;
        color: var(--text);
        line-height: 1.5;
        opacity: 0.8;
    }

    footer {
        text-align: center;
        margin-top: 50px;
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--primary);
        padding: 20px;
        background: var(--secondary);
        border-radius: 12px;
    }

    @media (max-aspect-ratio: 1/1) {
        .content-area {
            flex-direction: column;
        }

        .illustration {
            height: 250px;
            width: 100%;
            flex: none;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <header>
        <h1>{{ data.title }}</h1>
    </header>
    <div class="content-area">
        <div class="illustration">🩺</div>
        <div class="checklist">
            {% for item in data['items'] %}
            <div class="check-item">
                <div class="check-icon">{{ item.icon }}</div>
                <div class="check-content">
                    <div class="check-heading">{{ item.heading }}</div>
                    <div class="check-desc">{{ item.description }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <footer>{{ data.footer }}</footer>
</div>
{% endblock %}
